name: Promote Charm to Other Channel

on:
  workflow_call:
    inputs:
      origin-channel:
        description: 'Origin Channel'
        type: string
        required: true
      destination-channel:
        description: 'Destination Channel'
        type: string
        required: true
      base-channel:
        description: 'Charmcraft Base Channel'
        required: false
        type: string
        default: '22.04'

jobs:
  promote-charm:
    name: Promote Charm
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Promote charm to channel
        uses: canonical/charming-actions/release-charm@1753e0803f70445132e92acd45c905aba6473225 # 2.7.0
        with:
          credentials: ${{ secrets.CHARMCRAFT_CREDENTIALS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          origin-channel: ${{ github.event.inputs.origin-channel }}
          destination-channel: ${{ github.event.inputs.destination-channel }}
          base-channel: ${{ github.event.inputs.base-channel }}
