name: Integration Tests

on:
  workflow_call:
    inputs:
      container-name:
        description: Name of the application container to get logs from
        required: false
        type: string
      charm-config-path:
        description: Path to the application config file
        required: false
        type: string
      use-charmcraftcache:
        description: Enable usage of charmcraftcache
        required: false
        default: false
        type: boolean
      node-size:
        description: Size of the self-hosted node (one of medium, large or xlarge) to run the integration tests
        type: string
        required: false
        default: large
      tox-integration-test-targets:
        description: Comma separated list of tox targets needed to perform integration-tests
        type: string
        required: false
        default: integration
      pytest-model-option:
        description: "CLI option to pass the model name to pytest (use '--juju-model' for pytest-jubilant 2.0)"
        type: string
        required: false
        default: "--model"
      juju-model-name:
        description: "Juju model name passed to pytest. With jubilant 2.0 this is a prefix; the actual model is auto-discovered for debug steps."
        type: string
        required: false
        default: "testing"
      debug-enabled:
        type: boolean
        description: Run integration tests with tmate debugging enabled
        required: false
        default: false
      architecture:
        description: Target architecture to test for (e.g. amd64 or arm64)
        required: false
        default: amd64
        type: string
    secrets:
      GH_USERNAME:
        required: false
      GH_PAT:
        required: false

jobs:
  build:
    name: Build charm (${{ inputs.architecture }})
    uses: ./.github/workflows/_charm-build.yaml
    with:
      use-charmcraftcache: ${{ inputs.use-charmcraftcache }}
      architecture: ${{ inputs.architecture }}

  node-size-validation:
    runs-on: ubuntu-latest
    name: Input Node Size validation
    steps:
      - name: Validate node size variable
        if: ${{ !contains(fromJSON('["medium", "large", "xlarge"]'), inputs.node-size) }}
        run: exit 1

  integration-test:
    name: Integration Tests (microk8s) (${{ inputs.architecture }})
    runs-on: ${{ fromJSON(format('["self-hosted", "{0}", "{1}", "jammy"]', inputs.architecture, inputs.node-size)) }}
    needs:
      - build
      - node-size-validation
    steps:
      - name: Setup tmate session
        uses: canonical/action-tmate@main
        if: ${{ fromJSON(inputs.debug-enabled || 'false') }}
        timeout-minutes: 600
        with:
          detached: true
          sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup operator environment (microk8s)
        uses: charmed-kubernetes/actions-operator@main
        with:
          juju-channel: 3.6/stable
          provider: microk8s
          channel: 1.32-strict/stable
          microk8s-addons: "dns hostpath-storage metallb:10.64.140.43-10.64.140.49"

      - name: Get charm info
        id: get-charm-info
        run: |
          echo charm-name=$(cat charmcraft.yaml | yq '.name') >> $GITHUB_OUTPUT

      - name: Set CHARM_PATH envvar
        run: echo "CHARM_PATH=${{ github.workspace }}/${{ needs.build.outputs.charm-paths }}" >> $GITHUB_ENV

      - name: Download charm artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ github.sha }}-build-${{ inputs.architecture }}

      - name: Run integration tests
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: tox -e ${{ inputs.tox-integration-test-targets }} -- ${{ inputs.pytest-model-option }} ${{ inputs.juju-model-name }}

      - name: Resolve actual juju model name
        id: resolve-model
        if: always()
        run: |
          PREFIX="${{ inputs.juju-model-name }}"
          # Match exact name (legacy --model) or prefixed name like "testing-abc123" (jubilant 2.0 --juju-model)
          MODEL=$(juju models --format json | jq -r '.models[]."short-name"' | grep -E "^${PREFIX}(-|$)" | head -1)
          echo "model=${MODEL:-${PREFIX}}" >> "$GITHUB_OUTPUT"

      - name: Get contexts
        if: failure()
        run: kubectl config view

      - name: Get juju status
        if: failure()
        run: juju status --relations -m ${{ steps.resolve-model.outputs.model }}

      - name: Dump logs
        if: failure()
        uses: canonical/charming-actions/dump-logs@main

      - name: Get juju logs for the charm
        if: ${{ failure() }}
        run: juju debug-log --replay --include ${{ steps.get-charm-info.outputs.charm-name }}/0 -m ${{ steps.resolve-model.outputs.model }}

      - name: Get container logs
        if: ${{ failure() && (inputs.container-name != '') }}
        run: kubectl logs ${{ steps.get-charm-info.outputs.charm-name }}-0 -c ${{ inputs.container-name }} -n ${{ steps.resolve-model.outputs.model }}

      # Hack to overcome lack of tools (cat, tar) in the workload container
      - name: Get config file
        if: ${{ failure() && (inputs.charm-config-path != '') && (inputs.container-name != '') }}
        run: |
           juju ssh -m ${{ steps.resolve-model.outputs.model }} ${{ steps.get-charm-info.outputs.charm-name }}/0 "PYTHONPATH=agents/unit-${{ steps.get-charm-info.outputs.charm-name }}-0/charm/venv/ python3 -c '
           from ops import pebble
           p = pebble.Client(\"/charm/containers/${{ inputs.container-name }}/pebble.socket\")
           f = p.pull(\"${{ inputs.charm-config-path }}\")
           print(f.read())
           '"
