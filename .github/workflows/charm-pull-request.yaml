name: Pull Request Workflow

on:
  workflow_call:
    inputs:
      container-name:
        description: Name of the application container to get logs from
        required: false
        type: string
      charm-config-path:
        description: Path to the application config file
        required: false
        type: string
      use-charmcraftcache:
        description: Enable usage of charmcraftcache
        required: false
        default: false
        type: boolean
      node-size:
        description: Size of the self-hosted node (one of medium, large or xlarge) to run the integration tests
        type: string
        required: false
        default: large
      tox-unit-test-targets:
        description: Comma separated list of tox targets needed to perform unit-tests
        type: string
        required: false
        default: unit
      tox-integration-test-targets:
        description: Comma separated list of tox targets needed to perform integration-tests
        type: string
        required: false
        default: integration
      pytest-model-option:
        description: "CLI option to pass the model name to pytest (use '--juju-model' for pytest-jubilant 2.0)"
        type: string
        required: false
        default: "--model"
      juju-model-name:
        description: "Juju model name passed to pytest. With jubilant 2.0 this is a prefix; the actual model is auto-discovered for debug steps."
        type: string
        required: false
        default: "testing"
      debug-enabled:
        type: boolean
        description: Run integration tests with tmate debugging enabled
        required: false
        default: false
      use-canonical-k8s:
        type: boolean
        description: Whether to use canonical k8s instead of microk8s
        default: false
      modules:
        description: |
          List of testing modules to run the tests in JSON format, i.e. '["foo", "bar"]'.
          Each element will be passed to pytest through tox as -k argument.
        type: string
        default: '["test_charm.py"]'
    secrets:
      CHARMCRAFT_CREDENTIALS:
        required: false
      GH_USERNAME:
        required: false
      GH_PAT:
        required: false

jobs:
  node-size-validation:
    runs-on: ubuntu-latest
    name: Input Node Size validation
    steps:
      - name: Validate node size variable
        if: ${{ !contains(fromJSON('["medium", "large", "xlarge"]'), inputs.node-size) }}
        run: exit 1

  check:
    runs-on: ubuntu-24.04
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Get charm info
        id: info
        run: |
          platforms_json=$(cat charmcraft.yaml | yq '.platforms | keys | tojson')
          architectures=$(echo "$platforms_json" | jq -c 'map(split(":") | last) | unique')
          echo "architectures=$architectures" >> $GITHUB_OUTPUT

  linting:
    name: Linting
    uses: ./.github/workflows/_charm-linting.yaml

  unit-test:
    name: Unit Tests
    uses: ./.github/workflows/_charm-tests-unit.yaml
    with:
      tox-unit-test-targets: ${{ inputs.tox-unit-test-targets }}
    needs:
      - linting

  integration-test:
    name: Integration Tests (${{ matrix.architecture }})
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    needs:
      - node-size-validation
      - linting
      - unit-test
      - check
    secrets:
      GH_USERNAME: ${{ secrets.GH_USERNAME }}
      GH_PAT: ${{ secrets.GH_PAT }}
    strategy:
      matrix:
        architecture: ${{ fromJson(needs.check.outputs.architectures) }}
    with:
      # container-name: ${{ inputs.container-name }}
      # charm-config-path: ${{ inputs.charm-config-path }}
      # pytest-model-option: ${{ inputs.pytest-model-option }}
      # juju-model-name: ${{ inputs.juju-model-name }}
      # debug-enabled: ${{ inputs.debug-enabled }}
      use-canonical-k8s: ${{ inputs.use-canonical-k8s }}
      provider: ${{ inputs.use-canonical-k8s && 'k8s' || 'microk8s' }}
      channel: ${{ inputs.use-canonical-k8s && 'edge' || '1.32-strict/stable' }}
      microk8s-addons: ${{ inputs.use-canonical-k8s && '' || 'dns hostpath-storage metallb:10.64.140.43-10.64.140.49' }}
      extra-arguments: |
        --kube-config=~/.kube/config
      juju-channel: 3.6/stable
      self-hosted-runner: true
      self-hosted-runner-label: ${{ inputs.node-size }}
      self-hosted-runner-arch: ${{ matrix.architecture }}
      self-hosted-runner-image: noble
      test-tox-env: ${{ inputs.tox-integration-test-targets }}
      modules: ${{ inputs.modules }}
      # charmcraftcache: ${{ inputs.use-charmcraftcache }} # support was dropped, see https://github.com/canonical/operator-workflows/pull/978
