name: image publish for third-party application
run-name: Publish ROCK image of third-party application from ${{ inputs.rock }} to ghcr.io

on:
  workflow_call:
    inputs:
      rock:
        type: string
        required: false
        default: ""
        description: "Specific rock artifact to download. If empty, all rocks in the run will be downloaded and published as a multi-arch image."
    outputs:
      image:
        description: "container image"
        value: ${{ jobs.publish.outputs.image }}

jobs:
  publish:
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Get image name
        run: echo "image_name=$(yq -r '.name' rockcraft.yaml)" >> "$GITHUB_ENV"

      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.rock }}

      - name: Install Rockcraft to get Skopeo
        run: sudo snap install --classic --channel latest/stable rockcraft

      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ROCK to ghcr.io (latest or stable)
        run: |
          image_tag=$(yq -r '.version' rockcraft.yaml)
          versions=(latest "${{ github.sha }}" stable "$image_tag")
          mapfile -t rocks < <(find . -name "*.rock" -type f)

          if [ ${#rocks[@]} -eq 0 ]; then
            echo "No rock files found!"
            exit 1
          fi

          if [ ${#rocks[@]} -eq 1 ]; then
            # Single rock behavior (original fallback)
            rock="${rocks[0]}"
            for version in "${versions[@]}"; do
              sudo rockcraft.skopeo --insecure-policy copy \
                --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
                oci-archive:"$(realpath "$rock")" \
                docker://ghcr.io/${{ github.repository_owner }}/$image_name:"${version}"
            done
          else
            # Multi-arch behavior
            for version in "${versions[@]}"; do
              arch_tags=()
              for rock in "${rocks[@]}"; do
                filename=$(basename "$rock")
                no_ext="${filename%.rock}"
                arch="${no_ext##*_}"
                target_tag="${version}-${arch}"
                arch_tags+=("ghcr.io/${{ github.repository_owner }}/$image_name:${target_tag}")
                
                sudo rockcraft.skopeo --insecure-policy copy \
                  --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
                  oci-archive:"$(realpath "$rock")" \
                  docker://ghcr.io/${{ github.repository_owner }}/$image_name:"${target_tag}"
              done
              
              docker manifest create --amend ghcr.io/${{ github.repository_owner }}/$image_name:"${version}" "${arch_tags[@]}"
              docker manifest push ghcr.io/${{ github.repository_owner }}/$image_name:"${version}"
            done
          fi

          echo "image=ghcr.io/${{ github.repository_owner }}/$image_name:$image_tag" >> "$GITHUB_ENV"

      - name: Set output of image
        id: set
        run: echo "image=$image" >> "$GITHUB_OUTPUT"
