name: image publish for canonical-owned application
run-name: Publish ROCK image of canonical owned application from ${{ inputs.rock }} to ghcr.io/${{ github.repository }}

on:
  workflow_call:
    inputs:
      rock:
        type: string
        required: false
        default: ""
        description: "Specific rock artifact to download. If empty, all rocks in the run will be downloaded and published as a multi-arch image."
    outputs:
      image:
        description: "container image"
        value: ${{ jobs.publish.outputs.image }}

jobs:
  publish:
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.rock }}

      - name: Install Rockcraft to get Skopeo
        run: sudo snap install --classic --channel latest/stable rockcraft

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ROCK to ghcr.io (latest or stable)
        run: |
          if [ "${{ github.ref_type }}" = "branch" ]; then
            versions=(latest "${{ github.sha }}")
            image_tag="${{ github.sha }}"
          else
            versions=(stable "${{ github.ref_name }}")
            image_tag="${{ github.ref_name }}"
          fi

          mapfile -t rocks < <(find . -name "*.rock" -type f)

          if [ ${#rocks[@]} -eq 0 ]; then
            echo "No rock files found!"
            exit 1
          fi

          if [ ${#rocks[@]} -eq 1 ]; then
            # Single rock behavior (original)
            rock="${rocks[0]}"
            for version in "${versions[@]}"; do
              sudo rockcraft.skopeo --insecure-policy copy \
                --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
                oci-archive:"$(realpath "$rock")" \
                docker://ghcr.io/${{ github.repository }}:"${version}"
            done
          else
            # Multi-arch behavior
            for version in "${versions[@]}"; do
              arch_tags=()
              for rock in "${rocks[@]}"; do
                filename=$(basename "$rock")
                no_ext="${filename%.rock}"
                arch="${no_ext##*_}"
                target_tag="${version}-${arch}"
                arch_tags+=("ghcr.io/${{ github.repository }}:${target_tag}")
                
                sudo rockcraft.skopeo --insecure-policy copy \
                  --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
                  oci-archive:"$(realpath "$rock")" \
                  docker://ghcr.io/${{ github.repository }}:${target_tag}
              done
              
              docker manifest create --amend ghcr.io/${{ github.repository }}:"${version}" "${arch_tags[@]}"
              docker manifest push ghcr.io/${{ github.repository }}:"${version}"
            done
          fi

          echo "image=ghcr.io/${{ github.repository }}:${image_tag}" >> "$GITHUB_ENV"

      - name: Set output of image
        id: set
        run: echo "image=$image" >> "$GITHUB_OUTPUT"
