name: mattermost-daily-message
on:
  schedule:
    - cron: '30 6 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  daily-message-mattermost:
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Check schedule window
        id: timegate
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          paris_offset="$(TZ='Europe/Paris' date +%z)"
          run=false

          # Keep manual runs always available for testing.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            run=true
          # Summer time (UTC+2): the 06:30 UTC trigger is the 08:30 local run.
          elif [ "$paris_offset" = "+0200" ] && [ "$EVENT_SCHEDULE" = "30 6 * * 1-5" ]; then
            run=true
          # Winter time (UTC+1): the 07:30 UTC trigger is the 08:30 local run.
          elif [ "$paris_offset" = "+0100" ] && [ "$EVENT_SCHEDULE" = "30 7 * * 1-5" ]; then
            run=true
          fi

          echo "event_name=$EVENT_NAME"
          echo "event_schedule=$EVENT_SCHEDULE"
          echo "paris_offset=$paris_offset"
          echo "run=$run"

          if [ "$run" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Post daily message on mattermost
        id: post-daily-message
        if: steps.timegate.outputs.run == 'true'
        env:
          MATTERMOST_ACCESS_TOKEN: ${{ secrets.MATTERMOST_ACCESS_TOKEN }}
          MATTERMOST_CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}
          MATTERMOST_DAILY_MESSAGE: ${{ vars.MATTERMOST_DAILY_MESSAGE }}
        run: |
          payload="$(jq -nc --arg channel_id "$MATTERMOST_CHANNEL_ID" --arg message "$MATTERMOST_DAILY_MESSAGE" '{channel_id:$channel_id,message:$message}')"
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${MATTERMOST_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            https://chat.canonical.com/api/v4/posts \
            --data "$payload"

  daily-message-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Check schedule window
        id: timegate
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          paris_offset="$(TZ='Europe/Paris' date +%z)"
          run=false

          # Keep manual runs always available for testing.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            run=true
          # Summer time (UTC+2): the 06:30 UTC trigger is the 08:30 local run.
          elif [ "$paris_offset" = "+0200" ] && [ "$EVENT_SCHEDULE" = "30 6 * * 1-5" ]; then
            run=true
          # Winter time (UTC+1): the 07:30 UTC trigger is the 08:30 local run.
          elif [ "$paris_offset" = "+0100" ] && [ "$EVENT_SCHEDULE" = "30 7 * * 1-5" ]; then
            run=true
          fi

          echo "event_name=$EVENT_NAME"
          echo "event_schedule=$EVENT_SCHEDULE"
          echo "paris_offset=$paris_offset"
          echo "run=$run"

          if [ "$run" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout repository
        if: steps.timegate.outputs.run == 'true'
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Setup Go
        if: steps.timegate.outputs.run == 'true'
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache-dependency-path: tools/matrix-daily/go.sum
      - name: Run Matrix Sender
        if: steps.timegate.outputs.run == 'true'
        working-directory: ./tools/matrix-daily
        env:
          MATRIX_SERVER: ${{ secrets.MATRIX_SERVER }}
          MATRIX_USER_ID: ${{ vars.MATRIX_USER_ID }}
          MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}
          MATRIX_DAILY_MESSAGE: ${{ vars.MATRIX_DAILY_MESSAGE }}
        run: go run main.go
